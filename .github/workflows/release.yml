name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Smoke test
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"0.0.0"}}}' \
            | ./sysinfo-mcp \
            | grep -q '"result"'

      - name: Package
        id: package
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          ASSET="sysinfo-mcp-${VERSION}-darwin-arm64.tar.gz"
          tar -czf "${ASSET}" sysinfo-mcp
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.package.outputs.asset }}"

  homebrew:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: Justintime50/homebrew-releaser@v3
        with:
          homebrew_owner: marcelocantos
          homebrew_tap: homebrew-tap
          github_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          formula_folder: Formula
          version: ${{ github.event.release.tag_name }}
          install: 'bin.install "sysinfo-mcp" => "sysinfo-mcp"'
          target_darwin_arm64: true
          target_linux_amd64: false
          target_linux_arm64: false
          test: 'system bin/"sysinfo-mcp", "--version"'
          skip_checksum: true
          update_readme_table: true
