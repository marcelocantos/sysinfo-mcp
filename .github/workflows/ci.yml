name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  bullseye:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bullseye (build + tests + clean tree)
        run: make bullseye
